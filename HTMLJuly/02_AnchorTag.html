<!-- prettier-ignore -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anchor Tag In HTML</title>
  </head>
  <body>
    <h1>Learn Anchor Tag</h1>
    <!--?href means hyper reference -->
    <!--&Attribute is also of 2 types == 1.)Element Specific Attribute like href, like it works only in anchor tag, link tag etc. and Global Attribute like style attribute which works in all the tags.-->

    <!--?Absolute path -->
    <a href="https://www.flipkart.com">flipkart</a>

    <br />

    <!--?Relative path -->
    <a href="./01_HeadingTags.html">01_HeadingTags</a>

    <hr />
    <!--?when i click on this anchor tag the index html will be opened in same tag, to change this, we have to use one more attribute target, we can pass 4 values inside it.by default it's value is self -->
    <a href="./01_HeadingTags.html">index</a>

    <br />
    <!--~Now the html file will be opened in the new Tab. -->
    <a href="./01_HeadingTags.html" target="_blank">index 2</a>
  </body>
</html>
