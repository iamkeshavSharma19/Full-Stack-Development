<!-- prettier-ignore -->
<!DOCTYPE html>
<!--&DOCTYPE tells the version of the html to the Browser.It will increase the parsing/reading compatibility of the Browser,when the browser will parse/read our html from top to bottom.It basically optimises the parsing/reading compatibility of the Browsers. -->
<html lang="en">
  <!--~This html tag is also called as root tag.because our main html structure is starting from here. -->
  <!--!here lang is an attribute, attribute means additional information -->
  <head>
    <!--?head tag is used to store meta data.whatever data we will show inside the body, it's additional information would be store inside the head Tag. -->
    <meta charset="UTF-8" />
    <!--*This meta tag tells the characterset i.e UTF-8.it is superset of ASCII Set.it has 256 characters.ASCII Set only has 128 character sets -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--^This another meta tag is used to make webPage responsive -->
    <title>HTMLJuly</title>
  </head>
  <body>
    <!--&body tag is used to display the data on the UI -->
    <!--?<tagname> === This is called as Void Tag.An unpaired tag is called as Void/Empty Tag -->
  </body>
</html>
